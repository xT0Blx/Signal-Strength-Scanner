kind = "mobile"
previewPath = "/"
title = "Wi-Fi Signal Diagnostics"
version = "1.0.0"
id = "artifacts/wifi-diagnostics"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23515

[services.development]
run = "pnpm --filter @workspace/wifi-diagnostics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wifi-diagnostics", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/wifi-diagnostics", "run", "serve" ]

[services.env]
PORT = "23515"
BASE_PATH = "/"
